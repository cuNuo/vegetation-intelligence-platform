# infra/pygeoapi/config.yml
# 文件说明：独立 pygeoapi 服务配置。
# 主要职责：声明服务元数据、HTTP 监听参数，并把 spectral-index Process 绑定到 Python 处理器。
# 对外入口：OGC API - Processes 的 /processes/spectral-index 与 execution 端点。
# 维护约束：处理器名称必须与 backend/app/pygeoapi_processor.py 的可导入类路径一致。

server:
  # 容器内监听 5000；对外地址可由 Compose 或网关覆盖。
  bind:
    host: 0.0.0.0
    port: 5000
  url: http://localhost:5000
  mimetype: application/json
  encoding: utf-8
  language: zh-CN
  pretty_print: true
  limits:
    default_items: 10
    max_items: 100
  map:
    url: https://tile.openstreetmap.org/{z}/{x}/{y}.png
    attribution: OpenStreetMap contributors

logging:
  level: INFO

metadata:
  identification:
    title: 植被指数OGC API服务
    description: 30种植被指数动态处理服务
    keywords: [vegetation, raster, OGC API Processes]
    keywords_type: theme
    terms_of_service: https://example.org/terms
    url: https://example.org
  license:
    name: MIT
    url: https://opensource.org/license/mit
  provider:
    name: Canopy Lab
    url: https://example.org
  contact:
    name: Internship Developer
    email: developer@example.org
    role: developer

resources:
  # 单个动态处理器通过请求中的 index 字段选择任意已注册指数，
  # 因此无需为 35 个公式分别维护 35 份 YAML 和 Python 类。
  spectral-index:
    type: process
    processor:
      name: app.pygeoapi_processor.SpectralIndexProcessor
